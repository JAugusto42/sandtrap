name: ci
on:
  push: {branches: [main]}
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pin actions by SHA in your fork — tag-moving was the TeamPCP/Trivy vector.
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.22'}
      - run: make lint
      - run: make test
      - run: make build
      # dogfood: sandtrap scans its own testdata fixture
      - run: ./bin/sandtrap scan --fail-on critical testdata/demo-project || true
